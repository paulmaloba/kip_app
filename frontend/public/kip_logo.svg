<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0D1F3C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1"/>
    </radialGradient>
    <!-- Cornflower glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6495ED;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6495ED;stop-opacity:0"/>
    </radialGradient>
    <!-- Banknote gradient -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3a"/>
      <stop offset="50%" style="stop-color:#22883f"/>
      <stop offset="100%" style="stop-color:#156030"/>
    </linearGradient>
    <!-- Banknote sheen -->
    <linearGradient id="noteSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <!-- Metal gradient for hand -->
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A3F6B"/>
      <stop offset="100%" style="stop-color:#162B4D"/>
    </linearGradient>
    <linearGradient id="metalMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A5490"/>
      <stop offset="100%" style="stop-color:#2A3F6B"/>
    </linearGradient>
    <linearGradient id="metalLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6495ED;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#85B3F5;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Circuit line color -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Ambient glow behind hand -->
  <ellipse cx="200" cy="230" rx="130" ry="100" fill="url(#glowGrad)"/>

  <!-- ═══ Neural network dots (background decoration) ═══ -->
  <g opacity="0.25" fill="#6495ED">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="120" cy="40" r="2"/>
    <circle cx="290" cy="55" r="3"/>
    <circle cx="350" cy="90" r="2"/>
    <circle cx="40" cy="160" r="2"/>
    <circle cx="360" cy="150" r="3"/>
    <circle cx="55" cy="310" r="2"/>
    <circle cx="345" cy="300" r="2"/>
    <circle cx="90" cy="360" r="3"/>
    <circle cx="310" cy="355" r="2"/>
  </g>
  <!-- Neural lines -->
  <g opacity="0.12" stroke="#6495ED" stroke-width="1" fill="none">
    <line x1="50" y1="60" x2="120" y2="40"/>
    <line x1="120" y1="40" x2="290" y2="55"/>
    <line x1="290" y1="55" x2="350" y2="90"/>
    <line x1="50" y1="60" x2="40" y2="160"/>
    <line x1="350" y1="90" x2="360" y2="150"/>
    <line x1="40" y1="160" x2="55" y2="310"/>
    <line x1="360" y1="150" x2="345" y2="300"/>
    <line x1="55" y1="310" x2="90" y2="360"/>
    <line x1="345" y1="300" x2="310" y2="355"/>
  </g>

  <!-- ═══ BANKNOTE (tilted, held by hand) ═══ -->
  <g transform="translate(200,148) rotate(-22)">
    <!-- Note shadow -->
    <rect x="-78" y="-38" width="156" height="76" rx="6" fill="#000" opacity="0.35" transform="translate(4,5)"/>
    <!-- Note body -->
    <rect x="-78" y="-38" width="156" height="76" rx="6" fill="url(#noteGrad)"/>
    <!-- Note sheen -->
    <rect x="-78" y="-38" width="156" height="76" rx="6" fill="url(#noteSheen)"/>
    <!-- Note border inner -->
    <rect x="-72" y="-32" width="144" height="64" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
    <!-- Oval center emblem -->
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" opacity="0.8">K</text>
    <!-- Left decoration lines -->
    <line x1="-65" y1="-15" x2="-30" y2="-15" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="-65" y1="-8" x2="-30" y2="-8" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="-65" y1="-1" x2="-30" y2="-1" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="-65" y1="6" x2="-30" y2="6" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="-65" y1="13" x2="-30" y2="13" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <!-- Right decoration lines -->
    <line x1="30" y1="-15" x2="65" y2="-15" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="-8" x2="65" y2="-8" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="-1" x2="65" y2="-1" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="6" x2="65" y2="6" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="13" x2="65" y2="13" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <!-- Corner values -->
    <text x="-68" y="-22" font-family="monospace" font-size="9" fill="white" opacity="0.7">K50</text>
    <text x="42" y="28" font-family="monospace" font-size="9" fill="white" opacity="0.7">K50</text>
    <!-- Security strip -->
    <rect x="10" y="-38" width="6" height="76" fill="#6495ED" opacity="0.25"/>
    <!-- Microchip dots on note -->
    <circle cx="-55" cy="25" r="2" fill="#6495ED" opacity="0.5"/>
    <circle cx="-48" cy="25" r="2" fill="#6495ED" opacity="0.5"/>
    <circle cx="-41" cy="25" r="2" fill="#6495ED" opacity="0.5"/>
  </g>

  <!-- ═══ ROBOTIC HAND ═══ -->
  <!-- Wrist/base -->
  <rect x="152" y="290" width="96" height="40" rx="10" fill="url(#metalDark)" stroke="#6495ED" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Wrist joint lines -->
  <line x1="165" y1="290" x2="165" y2="330" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="235" y1="290" x2="235" y2="330" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Wrist circuit dots -->
  <circle cx="172" cy="310" r="2.5" fill="#6495ED" opacity="0.7"/>
  <circle cx="185" cy="310" r="2.5" fill="#6495ED" opacity="0.7"/>
  <circle cx="200" cy="310" r="2.5" fill="#6495ED" opacity="0.9" filter="url(#glow)"/>
  <circle cx="215" cy="310" r="2.5" fill="#6495ED" opacity="0.7"/>
  <circle cx="228" cy="310" r="2.5" fill="#6495ED" opacity="0.7"/>

  <!-- Palm -->
  <rect x="148" y="230" width="104" height="68" rx="12" fill="url(#metalMid)" stroke="#6495ED" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Palm panel lines (circuit board look) -->
  <rect x="158" y="240" width="84" height="48" rx="6" fill="none" stroke="#6495ED" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Palm circuit lines -->
  <line x1="170" y1="252" x2="230" y2="252" stroke="#6495ED" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="170" y1="264" x2="230" y2="264" stroke="#6495ED" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="200" y1="252" x2="200" y2="278" stroke="#6495ED" stroke-width="0.7" stroke-opacity="0.4"/>
  <!-- Palm center glowing node -->
  <circle cx="200" cy="264" r="8" fill="#6495ED" opacity="0.15"/>
  <circle cx="200" cy="264" r="4" fill="#6495ED" opacity="0.5" filter="url(#glow)"/>
  <circle cx="200" cy="264" r="2" fill="white" opacity="0.8"/>

  <!-- ─── FINGERS ─── -->
  <!-- Finger 1 (index) - leftmost, tilted left -->
  <g transform="translate(164,230) rotate(-12)">
    <!-- Finger segment 3 (tip) -->
    <rect x="-10" y="-72" width="20" height="24" rx="5" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="-5" y="-70" width="10" height="20" rx="3" fill="url(#metalLight)"/>
    <!-- joint -->
    <rect x="-11" y="-50" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Finger segment 2 -->
    <rect x="-10" y="-45" width="20" height="24" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
    <rect x="-5" y="-43" width="10" height="20" rx="3" fill="url(#metalLight)"/>
    <!-- joint -->
    <rect x="-11" y="-23" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Finger segment 1 (base) -->
    <rect x="-10" y="-18" width="20" height="22" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Finger 2 (middle) - straight up, tallest -->
  <g transform="translate(186,230) rotate(-4)">
    <rect x="-10" y="-80" width="20" height="26" rx="5" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="-5" y="-78" width="10" height="22" rx="3" fill="url(#metalLight)"/>
    <rect x="-11" y="-56" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-10" y="-51" width="20" height="26" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
    <rect x="-5" y="-49" width="10" height="22" rx="3" fill="url(#metalLight)"/>
    <rect x="-11" y="-27" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-10" y="-22" width="20" height="26" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Finger 3 (ring) -->
  <g transform="translate(214,230) rotate(4)">
    <rect x="-10" y="-74" width="20" height="24" rx="5" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="-5" y="-72" width="10" height="20" rx="3" fill="url(#metalLight)"/>
    <rect x="-11" y="-52" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-10" y="-47" width="20" height="24" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
    <rect x="-5" y="-45" width="10" height="20" rx="3" fill="url(#metalLight)"/>
    <rect x="-11" y="-25" width="22" height="6" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-10" y="-20" width="20" height="24" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Finger 4 (pinky) - rightmost, tilted right, shorter -->
  <g transform="translate(236,230) rotate(14)">
    <rect x="-9" y="-62" width="18" height="20" rx="5" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="-4" y="-60" width="8" height="16" rx="3" fill="url(#metalLight)"/>
    <rect x="-10" y="-44" width="20" height="5" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-9" y="-40" width="18" height="20" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
    <rect x="-4" y="-38" width="8" height="16" rx="3" fill="url(#metalLight)"/>
    <rect x="-10" y="-22" width="20" height="5" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-9" y="-18" width="18" height="22" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Thumb (left side, horizontal) -->
  <g transform="translate(148,268) rotate(-30)">
    <rect x="-50" y="-10" width="24" height="20" rx="5" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="-48" y="-5" width="20" height="10" rx="3" fill="url(#metalLight)"/>
    <rect x="-28" y="-11" width="6" height="22" rx="3" fill="url(#metalDark)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="-23" y="-10" width="26" height="20" rx="4" fill="url(#metalMid)" stroke="#6495ED" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- ═══ GLOWING ACCENT LINES on knuckles ═══ -->
  <line x1="154" y1="230" x2="246" y2="230" stroke="#6495ED" stroke-width="1.5" stroke-opacity="0.5" filter="url(#glow)"/>

  <!-- ═══ KIP TEXT ═══ -->
  <text x="200" y="372" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6" opacity="0.95">KIP</text>
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="9" fill="#6495ED" text-anchor="middle" letter-spacing="3" opacity="0.7">KWACHA INTELLIGENCE</text>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#6495ED" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#6495ED" stroke-width="0.5" stroke-opacity="0.1"/>
</svg>
